name: Deploy Backend to ECS

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: pipefy-backend
  ECS_CLUSTER: pipefy-cluster
  ECS_SERVICE: pipefy-backend-service
  CONTAINER_NAME: pipefy-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR ───────────────────────────────────────────────────────────────
      - name: Create ECR repository (if not exists)
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build & push ───────────────────────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" ./backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ── ECS Cluster ───────────────────────────────────────────────────────
      - name: Create ECS cluster (if not exists)
        run: |
          aws ecs create-cluster \
            --cluster-name "$ECS_CLUSTER" \
            --region "$AWS_REGION" 2>/dev/null || true

      # ── CloudWatch Logs ───────────────────────────────────────────────────
      - name: Create CloudWatch log group (if not exists)
        run: |
          aws logs create-log-group \
            --log-group-name "/ecs/pipefy-backend" \
            --region "$AWS_REGION" 2>/dev/null || true

      # ── IAM execution role ────────────────────────────────────────────────
      - name: Create ECS task execution role (if not exists)
        id: iam-role
        run: |
          ROLE_NAME="ecsTaskExecutionRole"

          ROLE_ARN=$(aws iam get-role \
            --role-name "$ROLE_NAME" \
            --query "Role.Arn" \
            --output text 2>/dev/null) || true

          if [ -z "$ROLE_ARN" ] || [ "$ROLE_ARN" = "None" ]; then
            ROLE_ARN=$(aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document '{
                "Version":"2012-10-17",
                "Statement":[{
                  "Effect":"Allow",
                  "Principal":{"Service":"ecs-tasks.amazonaws.com"},
                  "Action":"sts:AssumeRole"
                }]
              }' \
              --query "Role.Arn" \
              --output text)

            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
          fi

          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

      # ── Networking ────────────────────────────────────────────────────────
      - name: Resolve VPC, subnets, and security groups
        id: network
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" \
            --output text --region "$AWS_REGION")
          echo "VPC: $VPC_ID"

          # Two subnets in different AZs — ALB requires multi-AZ
          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "Subnets[0:2].SubnetId" \
            --output text --region "$AWS_REGION")
          SUBNET_1=$(echo "$SUBNETS" | awk '{print $1}')
          SUBNET_2=$(echo "$SUBNETS" | awk '{print $2}')
          echo "Subnets: $SUBNET_1 $SUBNET_2"

          # ALB security group — port 80 public
          ALB_SG_NAME="pipefy-alb-sg"
          ALB_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$ALB_SG_NAME" "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[0].GroupId" \
            --output text --region "$AWS_REGION" 2>/dev/null) || true

          if [ -z "$ALB_SG_ID" ] || [ "$ALB_SG_ID" = "None" ]; then
            ALB_SG_ID=$(aws ec2 create-security-group \
              --group-name "$ALB_SG_NAME" \
              --description "Pipefy ALB - port 80" \
              --vpc-id "$VPC_ID" --region "$AWS_REGION" \
              --query "GroupId" --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id "$ALB_SG_ID" \
              --protocol tcp --port 80 --cidr 0.0.0.0/0 \
              --region "$AWS_REGION"
          fi
          echo "ALB SG: $ALB_SG_ID"

          # ECS task security group — port 8000
          ECS_SG_NAME="pipefy-backend-sg"
          ECS_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$ECS_SG_NAME" "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[0].GroupId" \
            --output text --region "$AWS_REGION" 2>/dev/null) || true

          if [ -z "$ECS_SG_ID" ] || [ "$ECS_SG_ID" = "None" ]; then
            ECS_SG_ID=$(aws ec2 create-security-group \
              --group-name "$ECS_SG_NAME" \
              --description "Pipefy backend - port 8000" \
              --vpc-id "$VPC_ID" --region "$AWS_REGION" \
              --query "GroupId" --output text)
            aws ec2 authorize-security-group-ingress \
              --group-id "$ECS_SG_ID" \
              --protocol tcp --port 8000 --cidr 0.0.0.0/0 \
              --region "$AWS_REGION"
          fi
          echo "ECS SG: $ECS_SG_ID"

          echo "vpc_id=$VPC_ID"        >> "$GITHUB_OUTPUT"
          echo "subnet_1=$SUBNET_1"    >> "$GITHUB_OUTPUT"
          echo "subnet_2=$SUBNET_2"    >> "$GITHUB_OUTPUT"
          echo "alb_sg_id=$ALB_SG_ID" >> "$GITHUB_OUTPUT"
          echo "ecs_sg_id=$ECS_SG_ID" >> "$GITHUB_OUTPUT"

      # ── ALB + Target Group + Listener ─────────────────────────────────────
      - name: Create ALB, target group, and listener (if not exists)
        id: alb
        env:
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SUBNET_1: ${{ steps.network.outputs.subnet_1 }}
          SUBNET_2: ${{ steps.network.outputs.subnet_2 }}
          ALB_SG_ID: ${{ steps.network.outputs.alb_sg_id }}
        run: |
          TG_NAME="pipefy-backend-tg"
          ALB_NAME="pipefy-backend-alb"

          # Target Group
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "$TG_NAME" \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text --region "$AWS_REGION" 2>/dev/null) || true

          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            TG_ARN=$(aws elbv2 create-target-group \
              --name "$TG_NAME" \
              --protocol HTTP --port 8000 \
              --vpc-id "$VPC_ID" \
              --target-type ip \
              --health-check-path "/health" \
              --health-check-interval-seconds 30 \
              --healthy-threshold-count 2 \
              --unhealthy-threshold-count 3 \
              --query "TargetGroups[0].TargetGroupArn" \
              --output text --region "$AWS_REGION")
          fi
          echo "Target Group: $TG_ARN"

          # Application Load Balancer
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text --region "$AWS_REGION" 2>/dev/null) || true

          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name "$ALB_NAME" \
              --subnets "$SUBNET_1" "$SUBNET_2" \
              --security-groups "$ALB_SG_ID" \
              --scheme internet-facing \
              --type application \
              --query "LoadBalancers[0].LoadBalancerArn" \
              --output text --region "$AWS_REGION")
          fi

          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns "$ALB_ARN" \
            --query "LoadBalancers[0].DNSName" \
            --output text --region "$AWS_REGION")
          echo "ALB DNS: $ALB_DNS"

          # HTTP Listener
          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --query "Listeners[0].ListenerArn" \
            --output text --region "$AWS_REGION" 2>/dev/null) || true

          if [ -z "$LISTENER_ARN" ] || [ "$LISTENER_ARN" = "None" ]; then
            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTP --port 80 \
              --default-actions "Type=forward,TargetGroupArn=$TG_ARN" \
              --region "$AWS_REGION"
          fi

          echo "tg_arn=$TG_ARN"   >> "$GITHUB_OUTPUT"
          echo "alb_arn=$ALB_ARN" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$ALB_DNS" >> "$GITHUB_OUTPUT"

      # ── Task Definition ───────────────────────────────────────────────────
      - name: Register ECS task definition
        id: task-def
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
          EXECUTION_ROLE_ARN: ${{ steps.iam-role.outputs.role_arn }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family "pipefy-backend" \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu "256" \
            --memory "512" \
            --execution-role-arn "$EXECUTION_ROLE_ARN" \
            --region "$AWS_REGION" \
            --container-definitions "[
              {
                \"name\": \"$CONTAINER_NAME\",
                \"image\": \"$IMAGE\",
                \"essential\": true,
                \"portMappings\": [
                  { \"containerPort\": 8000, \"protocol\": \"tcp\" }
                ],
                \"environment\": [
                  { \"name\": \"OPENAI_API_KEY\",           \"value\": \"$OPENAI_API_KEY\" },
                  { \"name\": \"REDIS_URL\",                \"value\": \"$REDIS_URL\" },
                  { \"name\": \"OPENAI_MODEL\",             \"value\": \"gpt-5.4-mini\" },
                  { \"name\": \"OPENAI_EMBEDDING_MODEL\",   \"value\": \"text-embedding-3-small\" }
                ],
                \"logConfiguration\": {
                  \"logDriver\": \"awslogs\",
                  \"options\": {
                    \"awslogs-group\":         \"/ecs/pipefy-backend\",
                    \"awslogs-region\":        \"$AWS_REGION\",
                    \"awslogs-stream-prefix\": \"ecs\"
                  }
                }
              }
            ]" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      # ── ECS Service ───────────────────────────────────────────────────────
      - name: Create or update ECS service
        env:
          TASK_DEF_ARN: ${{ steps.task-def.outputs.task_def_arn }}
          TG_ARN: ${{ steps.alb.outputs.tg_arn }}
          SUBNET_1: ${{ steps.network.outputs.subnet_1 }}
          SUBNET_2: ${{ steps.network.outputs.subnet_2 }}
          ECS_SG_ID: ${{ steps.network.outputs.ecs_sg_id }}
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query "services[0].status" \
            --output text 2>/dev/null) || true

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            # Check if the service already has an ALB attached
            HAS_LB=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region "$AWS_REGION" \
              --query "length(services[0].loadBalancers)" \
              --output text 2>/dev/null) || true

            if [ "$HAS_LB" = "0" ] || [ -z "$HAS_LB" ]; then
              echo "Existing service has no ALB — recreating with ALB..."
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$ECS_SERVICE" \
                --desired-count 0 \
                --region "$AWS_REGION"
              aws ecs delete-service \
                --cluster "$ECS_CLUSTER" \
                --service "$ECS_SERVICE" \
                --region "$AWS_REGION"
              echo "Waiting for service to become inactive..."
              aws ecs wait services-inactive \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --region "$AWS_REGION"
              SERVICE_STATUS="MISSING"
            else
              echo "Updating task definition on existing service..."
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$ECS_SERVICE" \
                --task-definition "$TASK_DEF_ARN" \
                --force-new-deployment \
                --region "$AWS_REGION"
            fi
          fi

          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "Creating service with ALB..."
            aws ecs create-service \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={
                subnets=[$SUBNET_1,$SUBNET_2],
                securityGroups=[$ECS_SG_ID],
                assignPublicIp=ENABLED
              }" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=$CONTAINER_NAME,containerPort=8000" \
              --region "$AWS_REGION"
          fi

      # ── CloudFront (HTTPS) ────────────────────────────────────────────────
      - name: Create CloudFront distribution (if not exists)
        id: cloudfront
        env:
          ALB_DNS: ${{ steps.alb.outputs.alb_dns }}
        run: |
          CF_COMMENT="pipefy-backend-cf"

          # Check if distribution already exists by Comment field
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='$CF_COMMENT'].Id" \
            --output text 2>/dev/null) || true

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "Creating CloudFront distribution..."

            # Write config to a temp file to safely interpolate ALB_DNS
            cat > /tmp/cf-config.json << CFEOF
          {
            "CallerReference": "pipefy-backend-cf-v1",
            "Comment": "pipefy-backend-cf",
            "Origins": {
              "Quantity": 1,
              "Items": [{
                "Id": "ALB",
                "DomainName": "${ALB_DNS}",
                "CustomOriginConfig": {
                  "HTTPPort": 80,
                  "HTTPSPort": 443,
                  "OriginProtocolPolicy": "http-only"
                }
              }]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "ALB",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": {
                "Quantity": 7,
                "Items": ["DELETE","GET","HEAD","OPTIONS","PATCH","POST","PUT"],
                "CachedMethods": {"Quantity": 2, "Items": ["GET","HEAD"]}
              },
              "ForwardedValues": {
                "QueryString": true,
                "Cookies": {"Forward": "all"},
                "Headers": {"Quantity": 1, "Items": ["*"]}
              },
              "MinTTL": 0,
              "DefaultTTL": 0,
              "MaxTTL": 0,
              "Compress": true
            },
            "Enabled": true
          }
          CFEOF

            DIST_DOMAIN=$(aws cloudfront create-distribution \
              --distribution-config file:///tmp/cf-config.json \
              --query "Distribution.DomainName" \
              --output text)
          else
            echo "Reusing existing CloudFront distribution: $DIST_ID"
            DIST_DOMAIN=$(aws cloudfront get-distribution \
              --id "$DIST_ID" \
              --query "Distribution.DomainName" \
              --output text)
          fi

          echo "CloudFront HTTPS URL: https://$DIST_DOMAIN"
          echo "cf_domain=$DIST_DOMAIN" >> "$GITHUB_OUTPUT"

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print deployment summary
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
          TASK_DEF_ARN: ${{ steps.task-def.outputs.task_def_arn }}
          ALB_DNS: ${{ steps.alb.outputs.alb_dns }}
          CF_DOMAIN: ${{ steps.cloudfront.outputs.cf_domain }}
        run: |
          echo "### Deploy concluido" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo             | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster           | \`$ECS_CLUSTER\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service           | \`$ECS_SERVICE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task Definition   | \`$TASK_DEF_ARN\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image             | \`$IMAGE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ALB               | \`http://$ALB_DNS\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Backend HTTPS** | \`https://$CF_DOMAIN\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Atualize \`VITE_API_URL\` no Amplify para: \`https://$CF_DOMAIN\`" >> "$GITHUB_STEP_SUMMARY"
